<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0010"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2d0060"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4a329"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Orbite déco -->
  <ellipse cx="256" cy="256" rx="220" ry="80" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <!-- KIZ -->
  <text x="60" y="310" font-family="Georgia,serif" font-size="160" font-weight="900" fill="url(#gold)" letter-spacing="-4">KIZ</text>
  <!-- Séparateur -->
  <polygon points="310,180 326,256 310,332 294,256" fill="url(#purple)" opacity="0.9"/>
  <!-- QUIZZ -->
  <text x="330" y="310" font-family="Arial,sans-serif" font-size="130" font-weight="900" fill="url(#purple)" letter-spacing="-2">QZ</text>
  <!-- Underline -->
  <rect x="60" y="330" width="390" height="5" rx="2.5" fill="url(#gold)" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="40" cy="80" r="4" fill="#ffd166" opacity="0.8"/>
  <circle cx="470" cy="60" r="3" fill="#c084fc" opacity="0.8"/>
  <circle cx="480" cy="450" r="4" fill="#ffd166" opacity="0.7"/>
  <circle cx="30" cy="440" r="3" fill="#c084fc" opacity="0.6"/>
</svg>